<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Saad Badat — Portfolio Concepts</title>
<!-- Internal design-concepts page; keep it out of search results so the main site (saadbadat.me) ranks. -->
<meta name="robots" content="noindex, follow" />
<link rel="canonical" href="https://saadbadat.me/" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="landings.jsx"></script>
<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard, DCPostIt } = window;
  const W = 1080, H = 720;

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="landing" title="SAAD · Portfolio — Landing Directions"
          subtitle="Pastel 8-bit / Pokémon-RPG. Pick a direction (or mix). Content is placeholder — give me your real titles, name spelling & specialty.">
          <DCPostIt>
            Theme twist: capsules/pills replace Poké Balls, a “Resident Card” replaces the
            trainer card — original art, no branded assets. Typewriter dialog animates in A.
            Tell me which direction(s) you like and I’ll build the full Manuscripts + Research pages.
          </DCPostIt>
          <DCArtboard id="a" label="A · Dialog Intro (overworld scene)" width={W} height={H}>
            <LandingA />
          </DCArtboard>
          <DCArtboard id="b" label="B · START Menu (navigation-forward)" width={W} height={H}>
            <LandingB />
          </DCArtboard>
          <DCArtboard id="c" label="C · Resident Card (stat screen)" width={W} height={H}>
            <LandingC />
          </DCArtboard>
          <DCArtboard id="d" label="D · Title Screen (minimal splash)" width={W} height={H}>
            <LandingD />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
